  .collage{

  .c-item:hover .visual{ opacity:.9; }
  .c-letter{

    font-weight:500; letter-spacing:.06em;
    user-select:none; pointer-events:none;
  }
  @media (max-width:700px){
    .collage{ height:auto; min-height:0; padding:8px var(--pad) 0; }
    .c-item{ position:static; width:100%; margin:0 0 24px; }
    .c-letter{ display:none; }
  }

  /* ---------- filters + grid ---------- */
  .filters{
    display:flex; justify-content:center; flex-wrap:wrap;
    gap:14px clamp(16px, 3vw, 34px);
    padding:56px var(--pad) 0;
  }
  .grid{
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:24px; padding:44px var(--pad) 0;
  }
  @media (max-width:980px){ .grid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:600px){ .grid{ grid-template-columns:1fr; } }

    font-family:var(--serif); font-size:14px; text-align:center;
    margin-top:10px; opacity:0; transition:opacity .25s ease;

  .tile .cap .it{ display:inline; margin-left:.6em; color:var(--mut); }
  .tile:hover .cap{ opacity:1; }
  @media (hover:none){ .tile .cap{ opacity:1; } }
  .tile:hover .visual{ opacity:.9; }
  .visual{ aspect-ratio:16/10; overflow:hidden; position:relative; background:#0a0a0a; }

  /* ---------- generative light fields (placeholder visuals) ---------- */
  .lightfield{ position:absolute; inset:0; }
  .lightfield::before, .lightfield::after{
    content:""; position:absolute; inset:-30%;
    background:
      radial-gradient(40% 55% at 30% 60%, var(--g1), transparent 70%),
      radial-gradient(35% 45% at 72% 35%, var(--g2), transparent 70%);
    filter:blur(26px);
    animation:drift 26s ease-in-out infinite alternate;
  }
  .lightfield::after{
    background:
      radial-gradient(30% 40% at 65% 70%, var(--g2), transparent 70%),
      radial-gradient(25% 35% at 25% 25%, var(--g1), transparent 70%);
    animation-duration:34s; animation-direction:alternate-reverse;
    mix-blend-mode:screen;

const app = document.getElementById("app");

const bySlug = s => WORKS.find(w => w.slug === s);

/* tracked uppercase renders with a phantom space after the last letter;
   wrap the final character so words center true under their underline */
function spFix(scope){
  scope.querySelectorAll(".sp").forEach(el => {
    const t = el.textContent;
    if (!t.trim() || el.dataset.fx) return;
    el.innerHTML = t.slice(0, -1) +
      '<span style="letter-spacing:0">' + t.slice(-1) + '</span>';
    el.dataset.fx = "1";
  });
}

const isVid   = s => typeof s === "string" && (s.startsWith("data:video") || s.endsWith(".mp4"));
const isVimeo = s => typeof s === "string" && s.startsWith("vimeo:");

const mediaHTML = (src, alt) => {
  if (isVimeo(src))
    return `<div class="vwrap"><iframe src="https://player.vimeo.com/video/${src.slice(6)}"
            allow="autoplay; fullscreen; picture-in-picture" allowfullscreen
            title="${alt}" loading="lazy"></iframe></div>`;
  if (isVid(src))
    return `<video src="${src}" autoplay muted loop playsinline></video>`;
  return `<img src="${src}" alt="${alt}" loading="lazy">`;
};

const visualHTML = (w) => w.thumb
  ? `<div class="visual">${mediaHTML(w.thumb, w.title)}</div>`
  : `<div class="visual"><div class="lightfield" style="--g1:${w.g1};--g2:${w.g2}"></div></div>`;

const tileHTML = (w) => `
  <a class="tile" href="#/work/${w.slug}">
    ${visualHTML(w)}
    <div class="cap">${w.title}<span class="it">${w.year}</span></div>
  </a>`;

/* ---------- home: layered collage with mouse parallax ---------- */
function renderHome(){
  app.innerHTML = `
    <section class="collage" id="collage">
      ${COLLAGE.map(it => {
        if (it.type === "letter")
          return `<span class="c-letter" style="--x:${it.x};--y:${it.y}" data-d="${it.d}">${it.char}</span>`;
        const w = bySlug(it.slug);
        if (!w) return "";
        return `<a class="c-item" href="#/work/${w.slug}"
                   style="--x:${it.x};--y:${it.y};--w:${it.w}" data-d="${it.d}">
                  ${visualHTML(w)}
                </a>`;
      }).join("")}
    </section>`;
  initParallax();
}

function initParallax(){
  const mm = q => window.matchMedia ? window.matchMedia(q).matches : false;
  if (mm("(prefers-reduced-motion: reduce)") || mm("(hover: none)")) return;

  const items = Array.from(document.querySelectorAll("#collage [data-d]"));
  if (!items.length) return;

  let tx = 0, ty = 0, cx = 0, cy = 0, raf = null;
  const onMove = e => {
    tx = e.clientX / window.innerWidth  - 0.5;
    ty = e.clientY / window.innerHeight - 0.5;
  };
  const loop = () => {
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    for (const el of items){
      const d = parseFloat(el.dataset.d) || 0;
      el.style.transform = `translate3d(${(-cx * d).toFixed(2)}px, ${(-cy * d).toFixed(2)}px, 0)`;
    }
    raf = requestAnimationFrame(loop);
  };
  window.addEventListener("mousemove", onMove);
  raf = requestAnimationFrame(loop);
  collageCleanup = () => {
    window.removeEventListener("mousemove", onMove);
    if (raf) cancelAnimationFrame(raf);
  };
}

  } else {
    list = WORKS.filter(w => w.category === activeFilter);

  app.innerHTML = `

      ${FILTERS.map(f => `

                data-filter="${f}">${f}</button>
      `).join("")}
    </div>
    <div class="grid">${list.map(tileHTML).join("")}</div>`;

  app.querySelectorAll("[data-filter]").forEach(b =>
    b.addEventListener("click", () => {
      activeFilter = b.getAttribute("data-filter");
      renderGrid();
    }));
  spFix(app);
}

      <div class="lp-head">
        <h1>Shout out</h1>
        <span class="it">Works I keep returning to</span>
      </div>
      ${SHOUTOUT.map(x => `
        <div class="item">
          <div class="line"><em>${x.title}</em> — ${x.url
            ? `<a href="${x.url}" target="_blank" rel="noopener">${x.artist}</a>`
            : x.artist}</div>
          <span class="it">${[x.where, x.year].filter(Boolean).join(", ")}</span>
        </div>`).join("")}
      <span class="sp" style="display:block;text-align:center;margin:52px 0 22px">Artists</span>
      ${SHOUTOUT_ARTISTS.map(n => `
        <div class="item"><div class="line">${n}</div></div>`).join("")}
    </section>`;
  spFix(app);
}

/* ---------- about ---------- */
function renderAbout(){
  app.innerHTML = `
    <section class="about">
      <figure class="portrait">
        <img src="${ABOUT_PHOTO}" alt="Youyoung Shin installing work in a gallery">
        <figcaption>${ABOUT_QUOTE}</figcaption>
      </figure>
      <div class="bio">
        ${ABOUT_TEXT.map(t => `<p>${t}</p>`).join("")}
      </div>
    </section>`;
}

/* ---------- contact ---------- */
function renderContact(){
  const [email, ...social] = LINKS;
  app.innerHTML = `
    <section class="contact">
      <form class="cform" id="cform">
        <label class="sp" for="cf-name">Name</label>
        <input id="cf-name" name="name" type="text" placeholder="Your name" required>
        <label class="sp" for="cf-email">Email address</label>
        <input id="cf-email" name="email" type="email" placeholder="Your email address" required>
        <label class="sp" for="cf-msg">Message</label>
        <textarea id="cf-msg" name="message" placeholder="Your message" required></textarea>
        <button class="sp" type="submit">Send</button>
        <div class="cform-note" id="cform-note" aria-live="polite"></div>
      </form>
      <p><a href="${email.href}">${email.label}</a></p>
      <p>Follow me on ${social.map(l =>
        `<a href="${l.href}" target="_blank" rel="noopener">${l.label}</a>`
      ).join(", ")}</p>
      <p class="it">Los Angeles, California</p>
    </section>`;

  const form = document.getElementById("cform");
  form.addEventListener("submit", async e => {
    e.preventDefault();
    if (!form.reportValidity()) return;
    const note = document.getElementById("cform-note");
    const data = Object.fromEntries(new FormData(form));
    if (FORM_ENDPOINT){
      try{
        const r = await fetch(FORM_ENDPOINT, {
          method: "POST",
          headers: { "Accept": "application/json" },
          body: new FormData(form)
        });
        if (r.ok){ note.textContent = "Thank you — your message has been sent."; form.reset(); }
        else { note.textContent = "Something went wrong. Please email me directly below."; }
      } catch {
        note.textContent = "Something went wrong. Please email me directly below.";
      }
    } else {
      const subject = encodeURIComponent("Website inquiry from " + data.name);
      const body = encodeURIComponent(data.message + "\n\n— " + data.name + " (" + data.email + ")");
      window.location.href = "mailto:artyouyoung@gmail.com?subject=" + subject + "&body=" + body;
      note.textContent = "Your mail app should open with the message ready to send.";
    }
  });
  spFix(app);
}

/* ---------- router ---------- */
function route(){
  if (collageCleanup){ collageCleanup(); collageCleanup = null; }

  const hash = location.hash || "#/";
  let current = "home";

  if (hash.startsWith("#/work/"))      { renderWork(hash.slice(7)); current = "works"; }
  else if (hash === "#/featured")      { renderFeatured(); current = "featured"; }
  else if (hash === "#/works")         { renderGrid(); current = "works"; }
  else if (hash === "#/exhibitions")   { renderExhibitions(); current = "exhibitions"; }
  else if (hash === "#/cv")            { renderCV(); current = "cv"; }
  else if (hash === "#/about")         { renderAbout(); current = "about"; }
  else if (hash === "#/contact")       { renderContact(); current = "contact"; }
  else if (hash === "#/shoutout")      { renderShoutout(); current = "shoutout"; }
  else                                 { renderHome(); }

  document.querySelectorAll("[data-nav]").forEach(a =>
    a.classList.toggle("is-active", a.getAttribute("data-nav") === current));
  document.querySelectorAll(".topnav .col").forEach(col =>
    col.classList.toggle("open", !!col.querySelector(".is-active")));

  window.scrollTo(0, 0);
  const label = current === "cv" ? "CV"
    : current[0].toUpperCase() + current.slice(1);
  document.title = "Youyoung Shin" + (current !== "home" ? " — " + label : "");
}

/* nav hover intent: open on enter, forgiving close */
document.querySelectorAll(".topnav .col").forEach(col => {
  let t = null;
  col.addEventListener("mouseenter", () => {
    clearTimeout(t);
    col.classList.add("hovering");
  });
  col.addEventListener("mouseleave", () => {
    t = setTimeout(() => col.classList.remove("hovering"), 250);
  });
});

spFix(document.getElementById("topnav"));
window.addEventListener("hashchange", route);
route();
</script>
</body>
</html>
